<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শুভ জন্মদিন!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Deep, romantic animated gradient background */
            background: linear-gradient(-45deg, #2b1055, #7597de, #eb7c96, #2b1055);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Anek Bangla', 'Kalpurush', sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 450px;
            width: 85%;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Typography */
        #message-container {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        h2 {
            color: #ffffff;
            font-size: 1.8em;
            line-height: 1.5;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
        }

        /* Heart Icon */
        .heart-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 1.5s infinite;
            filter: drop-shadow(0 0 15px rgba(255, 107, 129, 0.8));
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Interactive Button */
        button {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 71, 87, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(255, 71, 87, 0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            animation: floatUp infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart-icon" id="top-icon">✨</div>
        <div id="message-container">
            <h2 id="text-display"></h2>
        </div>
        <button id="next-btn" onclick="nextMessage()">শুরু করি</button>
    </div>

    <script>
        // The beautiful messages broken down into steps
        const messages = [
            "শুভ জন্মদিন, আমার জীবনের সবচেয়ে সুন্দর মানুষটিকে! 💖",
            "তুমি আমার জীবনের সেই আলো, যা প্রতিদিন আমাকে বাঁচার নতুন কারণ দেখায়। ✨",
            "তোমার হাসি আমার পৃথিবীর সবচেয়ে দামি জিনিস। 😊",
            "কথা দিচ্ছি, জীবনের প্রতিটি পদক্ষেপে তোমার হাতটা শক্ত করে ধরে রাখবো। 🤝",
            "আমার জীবনে আসার জন্য ধন্যবাদ। অনেক অনেক ভালোবাসা তোমার জন্য! 🎉"
        ];

        let currentIndex = -1;
        const textDisplay = document.getElementById('text-display');
        const nextBtn = document.getElementById('next-btn');
        const topIcon = document.getElementById('top-icon');
        let isTyping = false;

        // Typewriter effect logic
        function typeWriter(text, i, cb) {
            if (i < text.length) {
                textDisplay.innerHTML = text.substring(0, i + 1);
                setTimeout(function() {
                    typeWriter(text, i + 1, cb)
                }, 50); // Speed of typing (lower is faster)
            } else if (cb) {
                isTyping = false;
                cb();
            }
        }

        // Logic to move to the next message
        function nextMessage() {
            if (isTyping) return; // Prevent clicking while text is still typing

            currentIndex++;
            
            if (currentIndex === 0) {
                nextBtn.innerText = "পরবর্তী"; // Change button text after start
                topIcon.innerText = "💖";
            }

            if (currentIndex < messages.length) {
                isTyping = true;
                textDisplay.innerHTML = ""; // Clear current text
                typeWriter(messages[currentIndex], 0, function() {
                    // Check if it's the last message
                    if (currentIndex === messages.length - 1) {
                        nextBtn.style.display = 'none'; // Hide button at the end
                        triggerHeartBurst();
                    }
                });
            }
        }

        // Background glowing particles
        function createParticles() {
            const numParticles = 40;
            for (let i = 0; i < numParticles; i++) {
                let particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Randomize size, position, and speed
                let size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                
                document.body.appendChild(particle);
            }
        }

        // A final burst of floating hearts when she reaches the last message
        function triggerHeartBurst() {
            topIcon.innerText = "❤️‍🔥";
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '💖';
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animation = 'floatUp ' + (Math.random() * 3 + 2) + 's linear';
                heart.style.zIndex = '1';
                heart.style.pointerEvents = 'none';
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 5000);
            }, 150);
        }

        // Initialize particles on load
        createParticles();
    </script>
</body>
</html>
